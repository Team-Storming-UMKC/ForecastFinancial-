server:
  port: 8080

spring:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:bank-api}
    expMinutes: ${JWT_EXP_MINUTES:60}
  flyway:
    baseline-on-migrate: true
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 30000
      max-lifetime: 600000
      keepalive-time: 0
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
lmstudio:
  base-url: ${AI_BASE_URL}
  timeout-ms: 15000
  model: "gemma-4-e4b-it"
  username: ${AI_TUNNEL_USER}
  password: ${AI_TUNNEL_PASS}
